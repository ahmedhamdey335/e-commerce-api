openapi: 3.0.3
info:
  title: 'E-Commerce API'
  description: 'A full-featured e-commerce REST API built with Laravel 12.'
  version: 1.0.0
servers:
  -
    url: 'http://e-commerce-api.test'
tags:
  -
    name: Addresses
    description: "\nEndpoints for managing customer shipping addresses."
  -
    name: Auth
    description: "\nEndpoints for user authentication."
  -
    name: Cart
    description: "\nEndpoints for managing the authenticated customer's shopping cart."
  -
    name: Categories
    description: "\nEndpoints for browsing and managing product categories."
  -
    name: Endpoints
    description: ''
  -
    name: Orders
    description: "\nEndpoints for placing orders and managing order workflows."
  -
    name: Products
    description: "\nEndpoints for browsing and managing products."
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'You can get your token by calling the login endpoint.'
security:
  -
    default: []
paths:
  /api/addresses:
    get:
      summary: 'List addresses'
      operationId: listAddresses
      description: 'Returns all saved addresses for the authenticated customer. Requires customer role.'
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: error
                  message: Unauthenticated
                  errors: null
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Unauthenticated
                  errors:
                    type: string
                    example: null
                    nullable: true
      tags:
        - Addresses
    post:
      summary: 'Create address'
      operationId: createAddress
      description: 'Creates a new address for the authenticated customer. Requires customer role.'
      parameters: []
      responses: {  }
      tags:
        - Addresses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: 'Must not be greater than 50 characters.'
                  example: b
                address:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: 'n'
                city:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: g
                postal_code:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: zmiyvdljnikhwayk
                  nullable: true
                country:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: c
                  nullable: true
              required:
                - title
                - address
                - city
  '/api/addresses/{address_id}':
    put:
      summary: 'Update address'
      operationId: updateAddress
      description: 'Updates an existing address owned by the authenticated customer. Requires customer role.'
      parameters: []
      responses: {  }
      tags:
        - Addresses
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: 'Must not be greater than 50 characters.'
                  example: b
                address:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: 'n'
                city:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: g
                postal_code:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: zmiyvdljnikhwayk
                  nullable: true
                country:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: c
                  nullable: true
    delete:
      summary: 'Delete address'
      operationId: deleteAddress
      description: 'Deletes an address owned by the authenticated customer. Requires customer role.'
      parameters: []
      responses: {  }
      tags:
        - Addresses
    parameters:
      -
        in: path
        name: address_id
        description: 'The ID of the address.'
        example: 2
        required: true
        schema:
          type: integer
  /api/register:
    post:
      summary: Register
      operationId: register
      description: 'Creates a new customer account and returns an access token.'
      parameters: []
      responses: {  }
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 255 characters.'
                  example: zbailey@example.net
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: '-0pBNvYgxw'
              required:
                - name
                - email
                - password
      security: []
  /api/login:
    post:
      summary: Login
      operationId: login
      description: 'Authenticates a user and returns an access token.'
      parameters: []
      responses: {  }
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: gbailey@example.net
                password:
                  type: string
                  description: ''
                  example: '|]|{+-'
              required:
                - email
                - password
      security: []
  /api/logout:
    post:
      summary: Logout
      operationId: logout
      description: 'Revokes the current access token.'
      parameters: []
      responses: {  }
      tags:
        - Auth
  /api/cart:
    get:
      summary: 'List cart items'
      operationId: listCartItems
      description: 'Returns all cart items for the authenticated customer. Requires customer role.'
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: error
                  message: Unauthenticated
                  errors: null
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Unauthenticated
                  errors:
                    type: string
                    example: null
                    nullable: true
      tags:
        - Cart
    post:
      summary: 'Add to cart'
      operationId: addToCart
      description: "Adds a product to the authenticated customer's cart or increases quantity if it already exists. Requires customer role."
      parameters: []
      responses: {  }
      tags:
        - Cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the products table.'
                  example: 16
                quantity:
                  type: integer
                  description: 'Must be at least 1.'
                  example: 22
              required:
                - product_id
                - quantity
  '/api/cart/{cartItem_id}':
    delete:
      summary: 'Remove cart item'
      operationId: removeCartItem
      description: 'Removes a cart item belonging to the authenticated customer. Requires customer role.'
      parameters: []
      responses: {  }
      tags:
        - Cart
    parameters:
      -
        in: path
        name: cartItem_id
        description: 'The ID of the cartItem.'
        example: 16
        required: true
        schema:
          type: integer
